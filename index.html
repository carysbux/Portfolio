<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carys · Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="app-shell">
    <nav class="site-nav" aria-label="Main navigation">
      <button type="button" class="nav-logo-button" data-scroll="section-home" aria-label="Back to home top">
        <img src="assets/name-logo.png" alt="" class="nav-logo-image" width="140" height="70" decoding="async" />
      </button>
      <button type="button" class="nav-ghost" data-scroll="about-anchor">About Me</button>
      <button type="button" class="nav-ghost" data-scroll="work-anchor">Projects</button>
    </nav>

    <main id="main" class="main">
      <section id="section-home" class="panel panel--home is-visible" aria-labelledby="home-heading">
        <h1 id="home-heading" class="visually-hidden">Carys Portfolio</h1>
        <div class="home-stack">
          <div class="hero-intro hero-stage">
            <span class="hero-script">Hi, my name's</span>
            <img
              class="hero-name-logo"
              src="assets/name-logo.png"
              alt="Carys"
              width="200"
              height="80"
              decoding="async"
            />
            <span class="hero-script">and I'm a</span>
            <span class="role-pill" aria-live="polite" aria-atomic="true">
              <img
                class="role-pill__img"
                src="assets/designer-word-selected/ios-selection-green_designer-5b4cee32-fe48-47a4-a339-61d080173105.png"
                alt="designer"
                width="180"
                height="46"
                decoding="async"
              />
            </span>
          </div>

          <div id="about-anchor" class="split-row split-row--winner reveal-on-scroll" aria-labelledby="winner-heading">
            <h2 id="winner-heading" class="split-row__label">I'm a <a href="case-studies/green-guard/index.html">winner</a>, too</h2>
            <figure class="split-row__figure split-row__figure--winner">
              <img
                src="images/solo copy.jpeg"
                alt="Carys holding a first place certificate."
                width="700"
                height="900"
                loading="lazy"
                decoding="async"
              />
            </figure>
          </div>

          <div class="split-row split-row--skills reveal-on-scroll" aria-labelledby="skills-heading">
            <h2 id="skills-heading" class="split-row__label">And I've got skills</h2>
            <figure class="split-row__figure">
              <img
                src="assets/tech-skills.png"
                alt="Open tin collage: name tag for Carys Bernard, B.S.C. Interactive Media, University of Miami '26, with photo, coding languages HTML CSS JavaScript Python, and design tools Illustrator, InDesign, Photoshop, Figma."
                width="900"
                height="900"
                loading="lazy"
                decoding="async"
              />
            </figure>
          </div>

          <div id="work-anchor" class="see-work reveal-on-scroll">
            <h2 class="see-work__title">My Work</h2>
          </div>
        </div>
        <div class="project-cards reveal-on-scroll">
          <a class="ios-card ios-card--featured" href="case-studies/green-guard/index.html" aria-label="Open Green Guard case study">
            <div class="ios-card-inner">
              <div class="ios-card-thumb ios-card-thumb--5" aria-hidden="true"></div>
              <span class="ios-card-label">Green Guard</span>
              <span class="ios-card-meta">Hackathon Project</span>
            </div>
          </a>
          <a class="ios-card" href="case-studies/ads-analysis/index.html" aria-label="Open ads analysis case study">
            <div class="ios-card-inner">
              <div class="ios-card-thumb ios-card-thumb--1" aria-hidden="true"></div>
              <span class="ios-card-label">Ads Analysis</span>
              <span class="ios-card-meta">Data Case Study</span>
            </div>
          </a>
          <a class="ios-card" href="case-studies/starter-garden/index.html" aria-label="Open starter garden case study">
            <div class="ios-card-inner">
              <div class="ios-card-thumb ios-card-thumb--2" aria-hidden="true"></div>
              <span class="ios-card-label">Starter Garden</span>
              <span class="ios-card-meta">Product Case Study</span>
            </div>
          </a>
          <a class="ios-card" href="case-studies/case-study-overlay/index.html" aria-label="Open context overlay case study">
            <div class="ios-card-inner">
              <div class="ios-card-thumb ios-card-thumb--3" aria-hidden="true"></div>
              <span class="ios-card-label">Context Overlay</span>
              <span class="ios-card-meta">Product Case Study</span>
            </div>
          </a>
        </div>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
